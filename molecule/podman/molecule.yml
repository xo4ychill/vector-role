---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: ubuntu-vector-podman
    image: ubuntu:latest
    command: "/usr/sbin/init"
    privileged: true
    cgroupns: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    pre_build_image: true

provisioner:
  name: ansible

verifier:
  name: ansible
