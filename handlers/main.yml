# =============================================================================
# handlers/main.yml
# =============================================================================
# Все хендлеры определены внутри ролей для лучшей инкапсуляции.
# Этот файл можно использовать для кросс-ролевых хендлеров.
---
- name: restart vector
  ansible.builtin.systemd:
    name: vector
    state: restarted
    daemon_reload: true
  # 🔍 Валидация перед рестартом (только если бинарник есть)
  when: lookup('file', vector_install_dir + '/bin/vector', errors='ignore') != ''

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
