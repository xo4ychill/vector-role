
# =============================================================================
# Vector role tasks
# =============================================================================
---

- name: Install Vector dependencies
  ansible.builtin.package:
    name:
      - curl
      - tar
    state: present

- name: Create Vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/vector
    - /var/lib/vector

- name: Download Vector archive
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/0.37.1/vector-0.37.1-x86_64-unknown-linux-gnu.tar.gz"
    dest: /tmp/vector.tar.gz
    mode: "0644"

- name: Extract Vector archive
  ansible.builtin.unarchive:
    src: /tmp/vector.tar.gz
    dest: /opt/
    remote_src: true
    creates: /opt/vector

- name: Deploy Vector config
  ansible.builtin.template:
    src: vector.toml.j2
    dest: /etc/vector/vector.toml
    mode: "0644"
  notify: restart vector

- name: Deploy systemd service
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    mode: "0644"
  notify: restart vector

- name: Enable and start Vector
  ansible.builtin.systemd:
    name: vector
    enabled: true
    state: started
    daemon_reload: true
