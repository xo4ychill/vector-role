# =============================================================================
# roles/vector-role/vars/main.yml — Внутренние переменные роли
# 💡 Эти значения НЕ предназначены для переопределения пользователем
# 💡 Содержат вычисляемые значения на основе фактов и дефолтов
# =============================================================================
---
# -----------------------------------------------------------------------------
# 🔄 Динамически вычисляемые значения
# -----------------------------------------------------------------------------

# Версия с префиксом 'v' для GitHub Releases
vector_version_tag: "v{{ vector_version }}"

# Авто-определение архитектуры (с фоллбэком на ENV)
vector_arch: >-
  {{ 
    'x86_64' if ansible_architecture | default('x86_64') == 'x86_64' 
    else 'aarch64' if ansible_architecture | default('x86_64') == 'aarch64'
    else (lookup('env', 'VECTOR_ARCH') | default('x86_64', true))
  }}

# Авто-определение ABI (с фоллбэком)
vector_os: >-
  {{ 
    'unknown-linux-gnu' if ansible_system | default('Linux') == 'Linux' 
    else 'unknown-linux-musl' if ansible_os_family | default('Debian') == 'Alpine'
    else (lookup('env', 'VECTOR_OS') | default('unknown-linux-gnu', true))
  }}

# Формирование имени файла и URL
vector_filename: "vector-{{ vector_version }}-{{ vector_arch }}-{{ vector_os }}.tar.gz"
vector_url: "{{ vector_github_base }}/{{ vector_version_tag }}/{{ vector_filename }}"

# -----------------------------------------------------------------------------
# 📁 Внутренние пути
# -----------------------------------------------------------------------------
vector_tmp_dir: "{{ lookup('env', 'VECTOR_TMP_DIR') | default('/tmp/vector-install', true) }}"
vector_binary_path: "{{ vector_install_dir }}/bin/vector"

# -----------------------------------------------------------------------------
# 🧩 Системные константы
# -----------------------------------------------------------------------------
vector_service_name: "{{ lookup('env', 'VECTOR_SERVICE_NAME') | default('vector', true) }}"
vector_config_format: "toml"
