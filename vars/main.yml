# =============================================================================
# roles/vector-role/vars/main.yml — Внутренние переменные роли Vector
# Назначение: 
#   • Значения, которые НЕ должны переопределяться пользователем
#   • Приоритет: ВЫШЕ, чем defaults/, но НИЖЕ, чем group_vars/host_vars
#   • Содержит вычисляемые значения и константы роли
# ⚠️ Изменение этих переменных может сломать роль!
# =============================================================================
---
# -----------------------------------------------------------------------------
# 🔄 Динамически вычисляемые значения (на основе фактов хоста)
# -----------------------------------------------------------------------------

# ✅ Версия с префиксом 'v' для корректного URL GitHub Releases
vector_version_tag: "v{{ vector_version }}"

# ✅ Авто-определение архитектуры: x86_64 или aarch64 (ARM64)
# 💡 Используется ansible_architecture fact (модуль setup)
vector_arch: >-
  {{ 
    'x86_64' if ansible_architecture | default('x86_64') == 'x86_64' 
    else 'aarch64' 
  }}

# ✅ Авто-определение ABI: gnu для большинства дистрибутивов, musl для Alpine
vector_os: >-
  {{ 
    'unknown-linux-gnu' if ansible_system | default('Linux') == 'Linux' 
    else 'unknown-linux-musl' 
  }}

# ✅ Формирование имени архива по шаблону релиза Vector
# 💡 Пример результата: vector-0.37.1-x86_64-unknown-linux-gnu.tar.gz
vector_filename: "vector-{{ vector_version }}-{{ vector_arch }}-{{ vector_os }}.tar.gz"

# ✅ Полный URL для скачивания (с учётом всех компонентов)
vector_url: "{{ vector_github_base }}/{{ vector_version_tag }}/{{ vector_filename }}"

# -----------------------------------------------------------------------------
# 📁 Внутренние пути (не предназначены для изменения)
# -----------------------------------------------------------------------------
vector_tmp_dir: "/tmp/vector-install"              # Временная директория
vector_binary_path: "{{ vector_install_dir }}/bin/vector"  # Путь к бинарнику

# -----------------------------------------------------------------------------
# 🧩 Системные константы
# -----------------------------------------------------------------------------
vector_service_name: "vector"                       # Имя systemd-сервиса
vector_config_format: "toml"                        # Формат конфига (не менять!)
