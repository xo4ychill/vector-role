# =============================================================================
# roles/vector-role/defaults/main.yml — Переменные по умолчанию для Vector
# Назначение: 
#   • Значения, которые МОГУТ быть переопределены пользователем
#   • Приоритет: ниже, чем vars/, group_vars/, host_vars/, playbook vars
#   • Документируют все настраиваемые параметры роли
# =============================================================================
---
# -----------------------------------------------------------------------------
# 🌐 Версия и источник загрузки
# -----------------------------------------------------------------------------
# ✅ Фиксируем версию для воспроизводимости (reproducibility)
vector_version: "0.37.1"

# 🌍 Базовый URL GitHub Releases (официальный источник)
vector_github_base: "https://github.com/vectordotdev/vector/releases/download"

# -----------------------------------------------------------------------------
# 📁 Пути установки (соответствуют Linux FHS и best practices)
# -----------------------------------------------------------------------------
vector_install_dir: "/opt/vector"           # Бинарные файлы
vector_config_dir: "/etc/vector"            # Конфигурация
vector_config_file: "{{ vector_config_dir }}/vector.toml"  # Основной конфиг
vector_log_dir: "/var/log/vector"           # Логи агента

# 👤 Системный пользователь/группа для запуска процесса
vector_user: "vector"
vector_group: "vector"

# -----------------------------------------------------------------------------
# 📦 Зависимости (пакеты, необходимые для работы роли)
# -----------------------------------------------------------------------------
vector_dependencies:
  - curl                      # Скачивание бинарника
  - ca-certificates           # HTTPS-сертификаты
  - xz-utils                  # Распаковка .tar.xz
  - gzip                      # Распаковка .tar.gz (fallback)
  - file                      # Валидация типа файла

# -----------------------------------------------------------------------------
# 🔗 Интеграция с ClickHouse (параметры подключения)
# -----------------------------------------------------------------------------
# 🌐 Endpoint БД (по умолчанию — localhost)
vector_clickhouse_endpoint: "http://127.0.0.1:8123"

# 🗄️ Целевая база данных и таблица
vector_clickhouse_database: "logs"
vector_clickhouse_table: "events"

# 🔐 Аутентификация
vector_clickhouse_user: "default"
vector_clickhouse_password: ""  # Задавать через ENV или vault!

# -----------------------------------------------------------------------------
# ⚙️ Настройки отправки (batch, retry, fallback)
# -----------------------------------------------------------------------------
# 📦 Batch-параметры для оптимизации сетевых запросов
vector_batch_max_events: 5000         # Отправлять после накопления N событий
vector_batch_timeout_secs: 2          # ИЛИ отправить через N секунд

# 📁 Fallback-файл для отладки (если отправка в БД не удалась)
vector_output_path: "{{ vector_log_dir }}/output.log"

# -----------------------------------------------------------------------------
# 🔐 Безопасность и валидация
# -----------------------------------------------------------------------------
# # ✅ SHA256 checksum для проверки целостности архива (опционально)
# # 💡 В production РЕКОМЕНДУЕТСЯ указывать для защиты от MITM
# vector_checksum: ""  # Формат: "sha256:abc123..."

# 🧪 Включить валидацию конфига после деплоя
vector_validate_config: true

# 🔄 Автоматический рестарт сервиса при изменении конфига
vector_restart_on_change: true